<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Scanner | M. Mikaeel Imran</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Ambient Glow in background */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo { height: 40px; margin-bottom: 20px; }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 0.7rem; letter-spacing: 4px; color: #00ffcc; text-transform: uppercase; margin-bottom: 30px; opacity: 0.8; }

        /* Mobile-Friendly Inputs */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin-left: 10px; }
        
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            margin-top: 8px;
            text-align: center;
            -webkit-appearance: none; /* Fixes mobile styling */
        }
        input:focus { border-color: #00ffcc; background: rgba(0, 255, 204, 0.05); }

        .btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border-radius: 15px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); background: #00ffcc; }

        /* Result Section */
        #results {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .score { font-size: 4rem; font-weight: 300; margin: 10px 0; }
        
        .status-pill {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .desc { font-size: 0.85rem; color: #888; line-height: 1.6; }

        footer { margin-top: 30px; font-size: 0.6rem; color: #444; letter-spacing: 1px; }
        .tag { color: #00ffcc; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <img src="https://beaconlightacademy.edu.pk/wp-content/uploads/2026/01/bla-footer-logo.png" alt="BLA" class="logo">
    
    <div class="card">
        <h1>Health Scan v10.0</h1>

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="w" placeholder="e.g. 55" inputmode="decimal">
        </div>

        <div class="input-group">
            <label>Height (inches)</label>
            <input type="number" id="i" placeholder="e.g. 64" inputmode="decimal">
        </div>

        <button class="btn" onclick="startScan()">Analyze Now</button>

        <div id="results">
            <div class="status-pill" id="pill">Normal</div>
            <div class="score" id="bmi">00.0</div>
            <p class="desc" id="msg">Scanning complete.</p>
        </div>
    </div>

    <footer>
        BEACON LIGHT ACADEMY | SCIENCE PROJECT<br>
        <div class="tag">BY M. MIKAEEL IMRAN</div>
    </footer>
</div>

<script>
    function startScan() {
        const weight = document.getElementById('w').value;
        const inches = document.getElementById('i').value;
        const resDiv = document.getElementById('results');

        if (weight > 0 && inches > 0) {
            // Step 1: Convert inches to meters
            const meters = inches * 0.0254;
            // Step 2: Calculate BMI (Weight / Meters squared)
            const bmi = (weight / (meters * meters)).toFixed(1);
            
            // Show the result area
            resDiv.style.display = "block";
            document.getElementById('bmi').innerText = bmi;

            const pill = document.getElementById('pill');
            const msg = document.getElementById('msg');

            // Step 3: Logic Gates (The ranges you asked for)
            if (bmi < 18.0) {
                pill.innerText = "Underweight";
                pill.style.background = "rgba(0, 180, 255, 0.2)";
                pill.style.color = "#00b4ff";
                msg.innerText = "The subject is below the healthy mass range.";
            } else if (bmi < 25.0) {
                pill.innerText = "Normal Weight";
                pill.style.background = "rgba(0, 255, 204, 0.2)";
                pill.style.color = "#00ffcc";
                msg.innerText = "The subject is in a healthy, balanced state.";
            } else if (bmi < 30.0) {
                pill.innerText = "Overweight";
                pill.style.background = "rgba(255, 150, 0, 0.2)";
                pill.style.color = "#ff9600";
                msg.innerText = "The subject is slightly above the standard range.";
            } else {
                pill.innerText = "Obese";
                pill.style.background = "rgba(255, 50, 50, 0.2)";
                pill.style.color = "#ff3232";
                msg.innerText = "The subject's mass is significantly high.";
            }
        } else {
            alert("Please enter numbers for Weight and Height!");
        }
    }
</script>

</body>
</html>
