<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Metric Terminal | M. Mikaeel Imran</title>
    <style>
        /* Importing sleek, modern fonts */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&family=Space+Mono&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Stops any up/down scrolling */
            perspective: 1000px;
            position: relative;
        }

        /* Ambient Science-Project Background */
        .background-effect {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a1118 0%, #000 100%);
            z-index: 0;
        }

        .nebula {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.12) 0%, transparent 70%);
            filter: blur(80px);
            animation: drift 12s infinite alternate;
        }

        @keyframes drift { 
            0% { transform: translate(-25%, -25%); } 
            100% { transform: translate(25%, 25%); } 
        }

        /* Main Container with 3D Tilt */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            text-align: center;
            transform-style: preserve-3d;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .academy-logo {
            height: 50px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.5));
        }

        /* Technical Info Bar */
        .formula-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: #555;
            margin-bottom: 35px;
            padding: 12px;
            border: 1px dashed #222;
            border-radius: 15px;
            letter-spacing: 1px;
        }
        .formula-tag b { color: #00ffcc; }

        /* Sleek Inputs */
        .input-field { margin-bottom: 25px; text-align: left; }
        
        label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-left: 15px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 25px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.2rem;
            outline: none;
            margin-top: 8px;
            text-align: center;
        }

        input:focus {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.1);
            transform: scale(1.03);
        }

        /* Pulsing Button */
        .btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .btn:hover {
            background: #00ffcc;
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 255, 204, 0.3);
        }

        /* Result Section */
        #result-box {
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #result-box.active {
            height: auto;
            opacity: 1;
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bmi-val { font-size: 4.5rem; font-weight: 200; margin-bottom: 10px; color: #fff; }
        
        .status-pill {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .explanation { font-size: 0.85rem; color: #888; line-height: 1.6; font-weight: 300; }

        footer {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 1px;
        }

        .mikaeel-tag {
            color: #00ffcc;
            font-weight: bold;
            border: 1px solid #222;
            padding: 6px 14px;
            border-radius: 10px;
            margin-top: 15px;
            display: inline-block;
            background: rgba(0, 255, 204, 0.05);
        }
    </style>
</head>
<body>

<div class="background-effect"></div>
<div class="nebula"></div>

<div class="container" id="tilt-card">
    <img src="https://beaconlightacademy.edu.pk/wp-content/uploads/2026/01/bla-footer-logo.png" alt="BLA Logo" class="academy-logo">
    
    <div class="card">
        <div class="formula-tag">
            BMI FORMULA: <b>WEIGHT (kg)</b> / <b>HEIGHT (m²)</b>
        </div>

        <div class="input-field">
            <label>Subject Weight (kg)</label>
            <input type="number" id="w" placeholder="00.0" step="0.1">
        </div>

        <div class="input-field">
            <label>Subject Height (cm)</label>
            <input type="number" id="h" placeholder="000">
        </div>

        <button class="btn" onclick="runAnalysis()">Analyze Subject</button>

        <div id="result-box">
            <div class="status-pill" id="pill">Analyzing...</div>
            <div class="bmi-val" id="score">--.-</div>
            <p class="explanation" id="msg">Scanning biometric data...</p>
        </div>
    </div>

    <footer>
        BEACON LIGHT ACADEMY | BIOMETRIC LAB 2026<br>
        <div class="mikaeel-tag">Made by M.MIKAEEL IMRAN</div>
    </footer>
</div>

<script>
    // 3D Tilt Logic: Card follows mouse movement
    const card = document.getElementById('tilt-card');
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
    });

    // BMI Calculation Logic
    function runAnalysis() {
        const weight = document.getElementById('w').value;
        const heightCm = document.getElementById('h').value;
        const resultBox = document.getElementById('result-box');
        
        if(weight > 0 && heightCm > 0) {
            // Formula Execution
            const heightM = heightCm / 100;
            const bmi = (weight / (heightM * heightM)).toFixed(1);
            
            document.getElementById('score').innerText = bmi;
            resultBox.classList.add('active');

            const pill = document.getElementById('pill');
            const msg = document.getElementById('msg');

            // Categorization
            if(bmi < 18.5) {
                pill.innerText = "Underweight";
                pill.style.background = "rgba(0, 150, 255, 0.15)";
                pill.style.color = "#0096ff";
                msg.innerText = "Weight is below optimal range for this height. Focus on nutrition.";
            } else if(bmi <= 24.9) {
                pill.innerText = "Normal weight";
                pill.style.background = "rgba(0, 255, 153, 0.15)";
                pill.style.color = "#00ff99";
                msg.innerText = "Subject is in the Healthy Zone. Perfect height-to-weight balance.";
            } else {
                pill.innerText = "Overweight Range";
                pill.style.background = "rgba(255, 100, 0, 0.15)";
                pill.style.color = "#ff6400";
                msg.innerText = "Weight exceeds optimal range. High physical activity is recommended.";
            }
        } else {
            alert("Please enter valid data points.");
        }
    }
</script>

</body>
</html>
