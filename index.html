<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanium Bio-Scanner | M. Mikaeel Imran</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Space+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            background: #020202;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px;
        }

        .grid {
            position: absolute;
            width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(60deg) translateY(-20%);
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }
        @keyframes gridMove { from { transform: rotateX(60deg) translateY(0); } to { transform: rotateX(60deg) translateY(50px); } }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 45px;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            position: relative;
        }

        .card::after {
            content: "";
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 204, 0.05), transparent);
            animation: scan 4s infinite;
        }
        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }

        .academy-logo {
            height: 45px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.6));
        }

        .header-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            color: #00ffcc;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 0.65rem; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-left: 10px; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 22px;
            border-radius: 25px;
            color: #fff;
            font-size: 1.3rem;
            outline: none;
            margin-top: 8px;
            text-align: center;
        }
        input:focus { border-color: #00ffcc; background: rgba(0, 255, 204, 0.05); transform: scale(1.02); }

        .scan-btn {
            width: 100%;
            padding: 22px;
            background: #fff;
            color: #000;
            border-radius: 25px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 15px;
        }
        .scan-btn:hover { background: #00ffcc; box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); transform: translateY(-5px); }

        #result-display {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #result-display.active { max-height: 400px; opacity: 1; margin-top: 35px; }

        .score-num { font-size: 5rem; font-weight: 200; line-height: 1; margin: 10px 0; }
        
        .health-bar-bg {
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
        }
        .health-bar-fill {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            border-radius: 10px;
            transition: width 1.5s ease-in-out, background 0.5s ease;
        }

        .status-tag { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .description { font-size: 0.85rem; color: #888; margin-top: 10px; line-height: 1.5; font-weight: 400; }

        footer { margin-top: 40px; font-size: 0.55rem; color: #444; letter-spacing: 2px; }
        .mikaeel-badge { 
            color: #00ffcc; 
            border: 1px solid #222; 
            padding: 8px 18px; 
            border-radius: 15px; 
            display: inline-block; 
            margin-top: 15px;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="container" id="card-wrap">
    <img src="https://beaconlightacademy.edu.pk/wp-content/uploads/2026/01/bla-footer-logo.png" alt="BLA" class="academy-logo">
    
    <div class="card">
        <div class="header-tag">BMI ANALYZER v7.1</div>

        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="00.0">
        </div>

        <div class="input-group">
            <label>Height (inches)</label>
            <input type="number" id="inches" placeholder="00">
        </div>

        <button class="scan-btn" onclick="startScan()">Run Analysis</button>

        <div id="result-display">
            <div class="status-tag" id="status">Ready</div>
            <div class="score-num" id="score">00.0</div>
            
            <div class="health-bar-bg">
                <div class="health-bar-fill" id="fill"></div>
            </div>

            <p class="description" id="desc">Enter data to begin biometric scan.</p>
        </div>
    </div>

    <footer>
        BEACON LIGHT ACADEMY | SCIENCE 2026<br>
        <div class="mikaeel-badge">M. MIKAEEL IMRAN</div>
    </footer>
</div>

<script>
    const wrap = document.getElementById('card-wrap');
    document.addEventListener('mousemove', (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 35;
        let y = (window.innerHeight / 2 - e.pageY) / 35;
        wrap.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    function startScan() {
        const w = document.getElementById('weight').value;
        const i = document.getElementById('inches').value;
        const display = document.getElementById('result-display');
        
        if(w > 0 && i > 0) {
            const meters = i * 0.0254;
            const bmi = (w / (meters * meters)).toFixed(1);
            
            document.getElementById('score').innerText = bmi;
            display.classList.add('active');

            const status = document.getElementById('status');
            const desc = document.getElementById('desc');
            const fill = document.getElementById('fill');

            let barWidth = (bmi / 40) * 100;
            fill.style.width = Math.min(barWidth, 100) + "%";

            // UPDATED RANGES
            if(bmi < 18.0) {
                status.innerText = "Underweight";
                status.style.color = "#00b4ff";
                fill.style.background = "#00b4ff";
                desc.innerText = "Subject mass is below threshold. Nutritional intake needs to be increased.";
            } else if(bmi < 25.0) {
                status.innerText = "Normal Weight";
                status.style.color = "#00ffcc";
                fill.style.background = "#00ffcc";
                desc.innerText = "Subject is within the healthy range. Maintain current lifestyle and diet.";
            } else if(bmi < 30.0) {
                status.innerText = "Overweight";
                status.style.color = "#ff9d00";
                fill.style.background = "#ff9d00";
                desc.innerText = "Subject is above standard range. Regular physical activity is advised.";
            } else {
                status.innerText = "Obese";
                status.style.color = "#ff3e3e";
                fill.style.background = "#ff3e3e";
                desc.innerText = "Subject mass is significantly high. Consult with a specialist for a health plan.";
            }
        }
    }
</script>

</body>
</html>
